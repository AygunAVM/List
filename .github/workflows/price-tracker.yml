name: Piyasa Fiyat Takibi

on:
  workflow_dispatch:

jobs:
  test-erisim:
    runs-on: ubuntu-latest
    steps:
      - name: Site erişim testi
        run: |
          echo "=== ERIŞIM TESTİ ==="
          curl -s -o /dev/null -w "akakce.com: %{http_code}\n" --max-time 8 "https://www.akakce.com/arama/?q=samsung" || echo "akakce.com: BAĞLANAMADI"
          curl -s -o /dev/null -w "cimri.com: %{http_code}\n" --max-time 8 "https://www.cimri.com/arama?q=samsung" || echo "cimri.com: BAĞLANAMADI"
          curl -s -o /dev/null -w "vatanbilgisayar.com: %{http_code}\n" --max-time 8 "https://www.vatanbilgisayar.com/arama/?q=samsung" || echo "vatanbilgisayar.com: BAĞLANAMADI"
          curl -s -o /dev/null -w "mediamarkt.com.tr: %{http_code}\n" --max-time 8 "https://www.mediamarkt.com.tr/tr/search.html?query=samsung" || echo "mediamarkt.com.tr: BAĞLANAMADI"
          echo "=== GERÇEK HTML İÇERİĞİ (ilk 500 karakter) ==="
          curl -s --max-time 8 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/122.0" "https://www.akakce.com/arama/?q=samsung" | head -c 500 || echo "İçerik alınamadı"
