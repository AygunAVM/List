name: Piyasa Fiyat Takibi

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      test_modu:
        description: 'Sadece ilk 10 urunu test et'
        type: boolean
        default: false

jobs:
  scrape-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fiyatları çek
        env:
          TEST_MODU: ${{ inputs.test_modu == true && '1' || '0' }}
        run: node scripts/price-scraper.js
        timeout-minutes: 25

      - name: Commit et
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/market-prices.json Data/market-prices.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Piyasa fiyatlari - $(date +'%Y-%m-%d %H:%M')"
          git push
