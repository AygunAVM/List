name: Piyasa Fiyat Takibi

on:
  schedule:
    - cron: '0 7 * * *'  # Her gün 10:00 Türkiye (UTC+3)
  workflow_dispatch:

jobs:
  scrape-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js kurulum
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fiyatları çek
        run: node scripts/price-scraper.js
        timeout-minutes: 20

      - name: Değişiklikleri commit et
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/market-prices.json Data/market-prices.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Piyasa fiyatları güncellendi - $(date +'%Y-%m-%d %H:%M')"
          git push
