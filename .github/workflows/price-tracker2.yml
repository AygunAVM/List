name: Piyasa Fiyat Takibi

on:
  schedule:
    - cron: '0 7 * * *'  # Her gün 10:00 Türkiye saati (UTC+3 = UTC 07:00)
  workflow_dispatch:       # Manuel tetikleme için

jobs:
  scrape-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js kurulum
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bağımlılıkları yükle
        run: |
          cd scripts
          npm install

      - name: Fiyatları çek
        run: |
          cd scripts
          node price-scraper.js
        timeout-minutes: 30

      - name: Değişiklikleri commit et
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Data/market-prices.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Piyasa fiyatları güncellendi - $(date +'%Y-%m-%d %H:%M')"
          git push
