<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Aygün AVM Fiyat Listesi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen" class="screen">
    <div class="login-card">
        <h2>Aygün AVM Panel</h2>
        <input type="email" id="email" placeholder="E-posta">
        <input type="password" id="password" placeholder="Şifre">
        <div class="remember-me">
            <input type="checkbox" id="remember"> <label for="remember">Beni Hatırla</label>
        </div>
        <button onclick="handleLogin()" class="btn-primary">Giriş Yap</button>
    </div>
</div>

<div id="main-screen" class="screen hidden">
    <header class="main-header">
        <div class="header-info">
            <h1>Aygün AVM Fiyat Listesi</h1>
            <span id="version-text">Yükleniyor...</span>
        </div>
        <div class="search-bar">
            <input type="text" id="search" placeholder="Ürün ara (Örn: sams buzd)" oninput="handleSearch()">
        </div>
    </header>

    <div class="table-container">
        <table id="product-table">
            <thead>
                <tr>
                    <th>Ürün</th>
                    <th>Stok</th>
                    <th>D.Kart</th>
                    <th>4T AWM</th>
                    <th>TekÇekim</th>
                    <th>Nakit</th>
                    <th>Açıklama</th>
                    <th>Kod</th>
                    <th class="small-text">Gam</th>
                    <th class="small-text">Marka</th>
                    <th>+</th>
                </tr>
            </thead>
            <tbody id="product-body"></tbody>
        </table>
    </div>

    <button class="cart-toggle" onclick="toggleCart()">🛒 Sepet (<span id="cart-count">0</span>)</button>
</div>

<div id="cart-screen" class="cart-overlay hidden">
    <div class="cart-content">
        <div class="cart-header">
            <h3>Sepetim</h3>
            <button onclick="toggleCart()" class="btn-close">X</button>
        </div>
        
        <div class="customer-info">
            <input type="text" id="cust-name" placeholder="Müşteri İsmi">
            <input type="tel" id="cust-phone" placeholder="Telefon (05xx)">
            <textarea id="cust-note" placeholder="Not ekle..."></textarea>
        </div>

        <div class="cart-table-wrapper">
            <table>
                <thead class="sticky-thead">
                    <tr>
                        <th>Ürün</th><th>Stok</th><th>D.Kart</th><th>4T</th><th>Tek</th><th>Nakit</th><th>Açıklama</th><th>Sil</th>
                    </tr>
                </thead>
                <tbody id="cart-body"></tbody>
            </table>
        </div>

        <div class="cart-footer">
            <div class="discount-section">
                <span>İndirim Yap:</span>
                <input type="number" id="global-discount" placeholder="0" oninput="applyDiscount()">
            </div>
            <button class="btn-whatsapp" onclick="sendWhatsApp()">WhatsApp Gönder</button>
        </div>
    </div>
</div>

<div id="change-modal" class="modal hidden">
    <div class="modal-content">
        <h3>Fiyat/Stok Güncellemeleri</h3>
        <ul id="change-list"></ul>
        <button onclick="closeChangeModal()" class="btn-primary">Anladım</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
