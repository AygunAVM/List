<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aygün AVM - Fiyat Listesi</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen" class="screen">
    <div class="login-card">
        <h2>Aygün AVM Panel</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" id="password" placeholder="Şifre">
        <button onclick="handleLogin()" class="btn-primary">Giriş Yap</button>
    </div>
</div>

<div id="main-screen" class="screen hidden">
    <header class="main-header">
        <div class="header-top">
            <h1>Aygün AVM</h1>
            <span id="version-text">v0.0.0</span>
        </div>
        <div class="search-container">
            <input type="text" id="search" placeholder="Ürün ara... (Örn: sams buzd)" oninput="handleSearch()">
        </div>
    </header>

    <div class="table-wrapper">
        <table id="product-table">
            <thead>
                <tr>
                    <th>Ürün Adı</th>
                    <th>Stok</th>
                    <th>D.Kart</th>
                    <th>4T AWM</th>
                    <th>Tek Çekim</th>
                    <th>Nakit</th>
                    <th>Açıklama</th>
                    <th>Kod</th>
                    <th>Marka</th>
                    <th>Ekle</th>
                </tr>
            </thead>
            <tbody id="product-body">
                </tbody>
        </table>
    </div>

    <button class="cart-fab" onclick="toggleCart()">
        🛒 <span id="cart-count">0</span>
    </button>
</div>

<div id="cart-overlay" class="overlay hidden">
    <div class="cart-modal">
        <div class="cart-header">
            <h3>Sipariş Detayı</h3>
            <button onclick="toggleCart()" class="btn-close">✕</button>
        </div>
        <div class="customer-fields">
            <input type="text" id="cust-name" placeholder="Müşteri Adı Soyadı">
            <input type="tel" id="cust-phone" placeholder="Telefon (05xx)">
            <textarea id="cust-note" placeholder="Sipariş notu..."></textarea>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <div class="discount-box">
                <span>İndirim:</span>
                <input type="number" id="global-discount" value="0" oninput="updateCartUI()">
            </div>
            <button onclick="sendWhatsApp()" class="btn-whatsapp">WhatsApp ile Gönder</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
