<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aygün AVM Fiyat Listesi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2>Aygün AVM</h2>
        <p>Fiyat Listesi Giriş</p>
        <div class="input-group">
            <input type="email" id="email" placeholder="E-posta">
            <input type="password" id="password" placeholder="Şifre">
        </div>
        <div class="login-footer">
            <label><input type="checkbox" id="remember"> Beni Hatırla</label>
            <button onclick="handleLogin()" class="btn-login">Giriş Yap</button>
        </div>
    </div>
</div>

<div id="app" style="display:none;">
    <header class="main-header">
        <div class="title-row">
            <h1>Aygün AVM Fiyat Listesi</h1>
            <span id="version-text">V1 2026.03.02 12:10</span>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Örn: sams buzd" oninput="filterData()">
        </div>
    </header>

    <div class="table-sticky-header">
        <div class="h-cell">Ürün</div>
        <div class="h-cell">Stok</div>
        <div class="h-cell">D.Kart</div>
        <div class="h-cell">4T AWM</div>
        <div class="h-cell">TekÇekim</div>
        <div class="h-cell">Nakit</div>
        <div class="h-cell">Açıklama</div>
        <div class="h-cell small-p">Kod</div>
        <div class="h-cell small-p">Gam</div>
        <div class="h-cell small-p">Marka</div>
    </div>

    <div id="product-list" class="product-container">
        </div>

    <button class="cart-toggle-btn" onclick="toggleCart()">🛒 Sepet (<span id="cart-count">0</span>)</button>
</div>

<div id="cart-panel" class="side-panel">
    <div class="cart-header-fixed">
        <h3>Sipariş Detayı</h3>
        <button onclick="toggleCart()">Kapat</button>
    </div>
    <div class="cart-inputs">
        <input type="text" id="custName" placeholder="Müşteri İsmi">
        <input type="tel" id="custTel" placeholder="Telefon (05xx)">
        <textarea id="orderNote" placeholder="Sipariş Notu..."></textarea>
    </div>
    <div id="cart-items">
        </div>
    <div class="cart-footer">
        <button class="btn-whatsapp" onclick="sendToWhatsApp()">WhatsApp Gönder</button>
    </div>
</div>

<div id="info-modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h4>Fiyat Değişiklik Bilgisi</h4>
        <div id="update-logs"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
