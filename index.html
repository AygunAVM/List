<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aygün AVM Satış Paneli</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <div class="login-logo-wrap">
                <img src="./logo.png" alt="Aygün AVM" onerror="this.style.display='none'">
            </div>
            <h2 class="login-subtitle">Yetkili Giriş</h2>
            <div class="login-field">
                <input type="email" id="user-input" placeholder="E-Mail">
            </div>
            <div class="login-field">
                <input type="password" id="pass-input" placeholder="Şifre">
            </div>
            <button class="btn-login" onclick="checkAuth()">Giriş Yap</button>
            <div id="login-err" style="display:none; color:red; margin-top:10px;"></div>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <header class="sticky-header">
            <div class="header-top">
                <img src="./logo.png" height="30" alt="Logo">
                <div class="header-right">
                    <button class="hdr-btn" onclick="openWelcomeModal()">ℹ️</button>
                    <button class="hdr-btn" id="admin-btn" onclick="openAdmin()" style="display:none;">⚙️</button>
                    <button class="cart-trigger" onclick="toggleCart()">🛒 <span id="cart-count">0</span></button>
                </div>
            </div>
            <div class="search-container">
                <input type="text" id="search" placeholder="Ürün ara..." oninput="filterData()">
            </div>
        </header>

        <main>
            <table id="product-table">
                <thead>
                    <tr>
                        <th>+</th><th>Ürün</th><th>Stok</th><th>Nakit</th><th>4T AWM</th>
                    </tr>
                </thead>
                <tbody id="product-list"></tbody>
            </table>
        </main>
    </div>

    <div class="modal-overlay" id="abakus-modal">
        <div class="abakus-modal-content">
            <div class="modal-header">
                <h3>🧮 Taksit Hesaplama</h3>
                <button onclick="closeAbakus()">✕</button>
            </div>
            <div class="abakus-body">
                <select id="ab-kart" onchange="calcAbakus()"></select>
                <div id="ab-result"></div>
                <div id="ab-actions" style="display:none; margin-top:15px; gap:10px;">
                    <button class="wa-send-btn" onclick="openWaFromAbakus()">📲 WhatsApp Teklif</button>
                    <button class="btn-sale" onclick="openSaleFromAbakus()">🧾 Satışa Aktar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="cart-modal">
        <div class="cart-modal-content">
            <div class="modal-header"><h3>🛒 Sepet</h3><button onclick="toggleCart()">✕</button></div>
            <div id="cart-table-area"></div>
            <div class="cart-footer">
                <button class="btn-abakus" onclick="openAbakus()">🧮 Hesapla</button>
                <button class="btn-clear" onclick="clearBasket()">🗑 Temizle</button>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
